<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚宴座位表 - B劇場</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #fdf8f3; color: #4a3728; line-height: 1.6; }
        .hero { background: linear-gradient(135deg, #d4a574 0%, #c4916a 50%, #b8805a 100%); color: #fff; text-align: center; padding: 48px 20px 36px; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%); }
        .hero h1 { font-size: 1.8em; font-weight: 300; letter-spacing: 4px; margin-bottom: 6px; position: relative; }
        .hero .subtitle { font-size: 1em; opacity: 0.9; font-weight: 300; letter-spacing: 2px; position: relative; }
        .hero .venue { font-size: 1.15em; margin-top: 10px; font-weight: 500; position: relative; }
        .hero .date { font-size: 0.95em; opacity: 0.85; margin-top: 4px; position: relative; }
        .nav-links { display: flex; justify-content: center; gap: 12px; padding: 14px 20px; background: #fff; border-bottom: 1px solid #e8d5c4; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #c4916a; font-size: 0.88em; padding: 6px 16px; border: 1px solid #d4a574; border-radius: 20px; transition: all 0.3s; }
        .nav-links a:hover, .nav-links a.active { background: #d4a574; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px 16px 0; }

        /* Floor Plan */
        .floor-plan { display: flex; flex-direction: column; align-items: center; }
        .food-exit { align-self: flex-start; font-size: 0.85em; color: #999; padding: 4px 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; background: #fff; }
        .stage { width: 60%; max-width: 280px; background: linear-gradient(135deg, #8b6914 0%, #a07828 100%); color: white; padding: 12px; text-align: center; border-radius: 8px; font-weight: bold; font-size: 1.05em; margin-bottom: 20px; }

        .table-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }
        .table-row.center { justify-content: center; }

        .table-circle { width: 72px; height: 72px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 3px 10px rgba(0,0,0,0.12); font-weight: bold; text-align: center; }
        .table-circle:hover { transform: scale(1.12); box-shadow: 0 5px 16px rgba(0,0,0,0.2); }
        .table-circle .num { font-size: 1.1em; line-height: 1.2; }
        .table-circle .label { font-size: 0.6em; line-height: 1.2; }
        .table-circle.selected { transform: scale(1.15); box-shadow: 0 0 0 3px #fff, 0 0 0 6px #c4916a; }

        /* Main table */
        .table-circle.main { width: 82px; height: 82px; background: linear-gradient(135deg, #e8b84b 0%, #d4a030 100%); border: 3px solid #c49428; color: #fff; }
        .table-circle.main .num { font-size: 1.3em; }
        .table-circle.main .label { font-size: 0.7em; }

        /* Elder male (red/coral) */
        .table-circle.elder-male { background: linear-gradient(135deg, #e86b5a 0%, #d45a4a 100%); border: 3px solid #c04a3a; color: #fff; }
        /* Elder female (pink) */
        .table-circle.elder-female { background: linear-gradient(135deg, #e87a98 0%, #d06888 100%); border: 3px solid #b85878; color: #fff; }
        /* Colleague (green) */
        .table-circle.colleague { background: linear-gradient(135deg, #6cc070 0%, #58a85c 100%); border: 3px solid #489848; color: #fff; }
        /* Male schoolmate (teal) */
        .table-circle.schoolmate { background: linear-gradient(135deg, #38b888 0%, #28a070 100%); border: 3px solid #209060; color: #fff; }
        /* Female schoolmate (purple) */
        .table-circle.female-schoolmate { background: linear-gradient(135deg, #9868c8 0%, #8050b0 100%); border: 3px solid #7040a0; color: #fff; }
        /* Female colleague (orange) */
        .table-circle.female-colleague { background: linear-gradient(135deg, #e8a030 0%, #d08820 100%); border: 3px solid #b87818; color: #fff; }

        .entrance { margin-top: 16px; margin-bottom: 16px; font-size: 0.85em; color: #999; padding: 4px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
        .floor-note { text-align: center; color: #aaa; font-size: 0.78em; margin-bottom: 16px; }

        /* Guest detail */
        .guest-list { background: #fff; border-radius: 12px; padding: 18px; margin: 0 auto 20px; box-shadow: 0 2px 10px rgba(180,140,100,0.08); border: 1px solid #f0e4d8; min-height: 60px; width: 100%; }
        .guest-list h3 { color: #c4916a; margin-bottom: 12px; font-size: 1.05em; }
        .guest-list ul { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; }
        .guest-list li { background: #fdf8f3; padding: 6px 12px; border-radius: 6px; border-left: 3px solid #c4916a; font-size: 0.9em; }
        .guest-list .placeholder { color: #bbb; text-align: center; font-size: 0.9em; }

        /* Search section */
        .search-section { margin: 0 auto 20px; width: 100%; }
        .search-section h3 { color: #c4916a; font-size: 1.05em; margin-bottom: 10px; }
        .search-box { width: 100%; padding: 10px 14px; font-size: 0.95em; border: 2px solid #d4a574; border-radius: 10px; font-family: 'Noto Sans TC', sans-serif; background: #fff; }
        .search-box:focus { outline: none; border-color: #c4916a; box-shadow: 0 0 8px rgba(196,145,106,0.3); }
        .search-result { background: #fff; border-radius: 12px; padding: 18px; margin-top: 10px; box-shadow: 0 2px 10px rgba(180,140,100,0.08); border: 1px solid #f0e4d8; text-align: center; display: none; }
        .search-result.show { display: block; }
        .search-result .found-table { font-size: 2.5em; color: #c4916a; font-weight: bold; }
        .search-result .found-name { font-size: 1.1em; color: #666; }

        /* All tables list */
        .tables-list { margin: 0 auto 30px; width: 100%; }
        .tables-list h3 { color: #c4916a; font-size: 1.05em; margin-bottom: 12px; }
        .table-item { background: #fff; border-left: 4px solid #c4916a; border-radius: 8px; margin-bottom: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(180,140,100,0.06); }
        .table-item-header { padding: 12px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #fdf8f3; user-select: none; transition: background 0.3s; }
        .table-item-header:hover { background: #f5ece0; }
        .table-item-title { font-weight: 500; font-size: 0.92em; }
        .table-item-count { font-size: 0.82em; color: #aaa; margin-left: 8px; }
        .chevron { transition: transform 0.3s; color: #c4916a; font-size: 0.8em; }
        .chevron.open { transform: rotate(180deg); }
        .table-item-content { display: none; padding: 10px 14px; }
        .table-item-content.show { display: block; }
        .table-item-content ul { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
        .table-item-content li { background: #fdf8f3; padding: 5px 10px; border-radius: 5px; font-size: 0.88em; }

        .badge { display: inline-block; font-size: 0.72em; padding: 1px 6px; border-radius: 4px; margin-left: 4px; font-weight: 500; vertical-align: middle; }
        .badge-veg { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .badge-beef { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        .badge-baby { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        .print-btn { display: inline-block; background: #c4916a; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 0.88em; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; margin-bottom: 12px; }
        .print-btn:hover { background: #b8805a; }

        @media print {
            body { background: #fff; }
            .hero, .nav-links, .guest-list, .search-section, .print-btn, .footer { display: none; }
            .floor-plan { margin-bottom: 20px; }
            .floor-plan .table-circle { box-shadow: none; border: 2px solid #999; }
            .floor-plan .table-circle.selected { transform: none; box-shadow: none; }
            .tables-list { margin: 0; }
            .tables-list h3 { font-size: 1.3em; margin-bottom: 16px; }
            .table-item-content { display: block !important; }
            .chevron { display: none; }
            .table-item { break-inside: avoid; margin-bottom: 12px; }
        }

        .footer { text-align: center; padding: 20px; color: #bbb; font-size: 0.78em; }

        @media (max-width: 400px) {
            .table-circle { width: 62px; height: 62px; }
            .table-circle .num { font-size: 0.95em; }
            .table-circle .label { font-size: 0.55em; }
            .table-circle.main { width: 72px; height: 72px; }
            .table-row { gap: 16px; }
            .hero h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>L & J Wedding</h1>
        <div class="subtitle">座位表</div>
        <div class="venue">新莊晶宴會館 1F B劇場</div>
        <div class="date">2026 年 3 月 21 日（六）</div>
    </div>

    <div class="nav-links">
        <a class="active" href="#">座位表</a>
        <a href="traffic.html">交通資訊</a>
        <a href="https://pse.is/LJWedding" target="_blank">婚禮邀請卡</a>
    </div>

    <div class="container">
        <div class="floor-plan">
            <div class="food-exit">出餐口</div>
            <div class="stage">舞台</div>

            <div class="table-row center">
                <div class="table-circle main" onclick="selectTable('01')">
                    <div class="num">01</div>
                    <div class="label">主桌</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle elder-male" onclick="selectTable('02')">
                    <div class="num">02</div>
                    <div class="label">男方長輩</div>
                </div>
                <div class="table-circle elder-female" onclick="selectTable('12')">
                    <div class="num">12</div>
                    <div class="label">女方長輩</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle elder-male" onclick="selectTable('10')">
                    <div class="num">10</div>
                    <div class="label">男方長輩2</div>
                </div>
                <div class="table-circle elder-female" onclick="selectTable('08')">
                    <div class="num">08</div>
                    <div class="label">女方長輩2</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle colleague" onclick="selectTable('04')">
                    <div class="num">04</div>
                    <div class="label">男方同事2</div>
                </div>
                <div class="table-circle colleague" onclick="selectTable('05')">
                    <div class="num">05</div>
                    <div class="label">男方同事3</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle colleague" onclick="selectTable('11')">
                    <div class="num">11</div>
                    <div class="label">男方同事4</div>
                </div>
                <div class="table-circle colleague" onclick="selectTable('03')">
                    <div class="num">03</div>
                    <div class="label">男方同事1</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle colleague" onclick="selectTable('09')">
                    <div class="num">09</div>
                    <div class="label">男方同事5</div>
                </div>
                <div class="table-circle female-schoolmate" onclick="selectTable('06')">
                    <div class="num">06</div>
                    <div class="label">女方同學</div>
                </div>
            </div>

            <div class="table-row">
                <div class="table-circle schoolmate" onclick="selectTable('07')">
                    <div class="num">07</div>
                    <div class="label">男方同學</div>
                </div>
                <div class="table-circle female-colleague" onclick="selectTable('13')">
                    <div class="num">13</div>
                    <div class="label">女方同事</div>
                </div>
            </div>

            <div class="entrance">入口</div>
            <div class="floor-note">一樓大廳｜此圖為參考擺放方式，實際需以現場為主</div>
        </div>

        <div class="guest-list" id="guest-list">
            <p class="placeholder">點擊桌位查看賓客名單</p>
        </div>

        <div class="search-section">
            <h3>🔍 查詢我的桌號</h3>
            <input type="text" class="search-box" id="search-input" placeholder="輸入賓客名字..." oninput="searchGuest()">
            <div class="search-result" id="search-result"></div>
        </div>

        <div class="tables-list">
            <h3>📋 所有桌位 <button class="print-btn" onclick="window.print()">🖨️ 列印</button></h3>
            <div id="tables-list-content"></div>
        </div>
    </div>

    <div class="footer">L & J · 2026.03.21</div>

    <script>
    var tableData = {
        '01': { name: '主桌', guests: [] },
        '02': { name: '男方長輩', guests: [] },
        '03': { name: '男方同事1', guests: ['姬宣慈','蔡尚斌','建廷','胡慧禪','彭鼎言','陳盈瑋','Wynne','佳佳','林佑儒','宋冠杰'] },
        '04': { name: '男方同事2', guests: ['呂宗翰','啟豪','何承家','何承家+1','何承家小孩(嬰兒椅)','林逸軒','林逸軒+1','胤廷'] },
        '05': { name: '男方同事3', guests: ['吳順成','吳順成+1','吳順成小孩(嬰兒椅)','鄭彤薰(素食)','陳宜佳','陳宜佳+1','陳宜佳小孩(嬰兒椅)','KIDD','王偉明','MAY','白合廷'] },
        '06': { name: '女方同學', guests: ['黃鳳英','翁郁棠','方羿文','朱學亞(不吃牛)','游明鋗','游明鋗+1','游明鋗小孩(嬰兒椅)','游明鋗小孩2(嬰兒椅)','涂佩茹','王若芳'] },
        '07': { name: '男方同學', guests: ['鄭涵宇','鄭涵宇+1','林詣','林詣+1','林詣小孩','林詣小孩2','陳映帆','陳映帆+1','陳映帆小孩(嬰兒椅)','陳映帆小孩2'] },
        '08': { name: '女方長輩2', guests: [] },
        '09': { name: '男方同事5', guests: ['劉玉鈴','劉玉鈴小孩(嬰兒椅)','賴怡文','王俊翔','小季','李昭成','慶澤','戴名祥','京霖'] },
        '10': { name: '男方長輩2', guests: [] },
        '11': { name: '男方同事4', guests: ['陳玉涵','陳玉涵+1','Benson','Benson+1','Nick 蘇子豪','徐珍珠','李棋芳','羅文萱','潘宜萱','Ning'] },
        '12': { name: '女方長輩', guests: [] },
        '13': { name: '女方同事', guests: ['陳映羽','鄧霖','陳家宜','王毓潔','簡芸暄','簡芸暄+1','簡芸暄小孩(嬰兒椅)','林昱妍','謝佳樺','馮昱瑋','歐冠伶'] }
    };

    var currentTable = null;

    function formatGuest(name) {
        return name
            .replace(/\(素食\)/g, '<span class="badge badge-veg">素食</span>')
            .replace(/\(不吃牛\)/g, '<span class="badge badge-beef">不吃牛</span>')
            .replace(/\(嬰兒椅\)/g, '<span class="badge badge-baby">嬰兒椅</span>');
    }

    function selectTable(num) {
        currentTable = num;
        var t = tableData[num];
        var el = document.getElementById('guest-list');
        var html = '<h3>桌 ' + num + ' - ' + t.name + '</h3>';
        if (t.guests.length === 0) {
            html += '<p style="color:#bbb">此桌尚未安排賓客名單</p>';
        } else {
            html += '<ul>';
            for (var i = 0; i < t.guests.length; i++) {
                html += '<li>' + formatGuest(t.guests[i]) + '</li>';
            }
            html += '</ul>';
        }
        el.innerHTML = html;

        // Highlight selected table
        var circles = document.querySelectorAll('.table-circle');
        for (var j = 0; j < circles.length; j++) circles[j].classList.remove('selected');
        event.currentTarget.classList.add('selected');
    }

    function searchGuest() {
        var term = document.getElementById('search-input').value.toLowerCase().trim();
        var el = document.getElementById('search-result');
        if (!term) { el.classList.remove('show'); return; }
        var found = null;
        var keys = Object.keys(tableData);
        for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            for (var j = 0; j < tableData[k].guests.length; j++) {
                if (tableData[k].guests[j].toLowerCase().indexOf(term) >= 0) {
                    found = { num: k, data: tableData[k] };
                    break;
                }
            }
            if (found) break;
        }
        if (found) {
            el.innerHTML = '<div class="found-name">' + found.data.name + '</div><div class="found-table">桌 ' + found.num + '</div>';
        } else {
            el.innerHTML = '<p style="color:#bbb">未找到此賓客</p>';
        }
        el.classList.add('show');
    }

    function toggleItem(header) {
        var content = header.nextElementSibling;
        var chevron = header.querySelector('.chevron');
        content.classList.toggle('show');
        chevron.classList.toggle('open');
    }

    // Build tables list
    (function() {
        var order = ['01','02','03','04','05','06','07','08','09','10','11','12','13'];
        var html = '';
        for (var i = 0; i < order.length; i++) {
            var num = order[i];
            var t = tableData[num];
            var count = t.guests.length > 0 ? '<span class="table-item-count">' + t.guests.length + ' 人</span>' : '';
            html += '<div class="table-item"><div class="table-item-header" onclick="toggleItem(this)"><span><span class="table-item-title">桌 ' + num + ' - ' + t.name + '</span>' + count + '</span><span class="chevron">▼</span></div><div class="table-item-content">';
            if (t.guests.length === 0) {
                html += '<p style="color:#bbb">此桌尚未安排賓客名單</p>';
            } else {
                html += '<ul>';
                for (var j = 0; j < t.guests.length; j++) html += '<li>' + formatGuest(t.guests[j]) + '</li>';
                html += '</ul>';
            }
            html += '</div></div>';
        }
        document.getElementById('tables-list-content').innerHTML = html;
    })();
    </script>
</body>
</html>
